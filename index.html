  <nav class="controls" data-i18n-attr="aria-label:controls.ariaLabel">
    <button id="prevBtn" type="button" data-i18n="controls.prev"></button>
    <div id="slideIndicator" class="slide-indicator" aria-live="polite"></div>
    <button id="nextBtn" type="button" data-i18n="controls.next"></button>
  </nav>

  <script>
    (async function () {
      var i18nMessages = {};
      var missingKeys = {};

      function getMessageByPath(source, key) {
        var path = String(key || "").split(".");
        var value = source;
        for (var i = 0; i < path.length; i += 1) {
          if (!value || typeof value !== "object" || !Object.prototype.hasOwnProperty.call(value, path[i])) {
            return undefined;
          }
          value = value[path[i]];
        }
        return value;
      }

      function interpolateMessage(template, vars) {
        if (!vars) {
          return template;
        }
        return template.replace(/\{([a-zA-Z0-9_]+)\}/g, function (_match, key) {
          return Object.prototype.hasOwnProperty.call(vars, key) ? String(vars[key]) : "";
        });
      }

      function t(key, vars) {
        var template = getMessageByPath(i18nMessages, key);
        if (typeof template !== "string") {
          if (!missingKeys[key]) {
            missingKeys[key] = true;
            console.warn("[i18n] Missing translation key:", key);
          }
          return "";
        }
        return interpolateMessage(template, vars);
      }

      function applyI18n() {
        var textNodes = document.querySelectorAll("[data-i18n]");
        for (var i = 0; i < textNodes.length; i += 1) {
          var node = textNodes[i];
          node.textContent = t(node.getAttribute("data-i18n"));
        }

        var htmlNodes = document.querySelectorAll("[data-i18n-html]");
        for (var j = 0; j < htmlNodes.length; j += 1) {
          var htmlNode = htmlNodes[j];
          htmlNode.innerHTML = t(htmlNode.getAttribute("data-i18n-html"));
        }

        var attrNodes = document.querySelectorAll("[data-i18n-attr]");
        for (var k = 0; k < attrNodes.length; k += 1) {
          var attrNode = attrNodes[k];
          var definition = attrNode.getAttribute("data-i18n-attr") || "";
          var mappings = definition.split(";");

          for (var m = 0; m < mappings.length; m += 1) {
            var mapping = mappings[m].trim();
            if (!mapping) {
              continue;
            }
            var separatorIndex = mapping.indexOf(":");
            if (separatorIndex === -1) {
              continue;
            }
            var attributeName = mapping.slice(0, separatorIndex).trim();
            var translationKey = mapping.slice(separatorIndex + 1).trim();
            attrNode.setAttribute(attributeName, t(translationKey));
          }
        }
      }

      async function loadI18n(url) {
        try {
          var response = await fetch(url, { cache: "no-store" });
          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }
          i18nMessages = await response.json();
        } catch (error) {
          i18nMessages = {};
          document.body.setAttribute("data-text-load-error", "true");
          if (window.location.protocol === "file:") {
            document.body.setAttribute("data-text-load-error-reason", "file-protocol");
            console.error(
              "[i18n] Failed to load presentation texts from file://. Start a local server, e.g. `python3 -m http.server`, and open http://localhost:8000/index.html",
              error
            );
          } else {
            console.error("[i18n] Failed to load presentation texts:", error);
          }
        }
      }

      await loadI18n("texts/presentation.de-CH.json");
      applyI18n();

      var deck = document.getElementById("deck");
      var slides = Array.prototype.slice.call(deck.querySelectorAll(".slide"));
      var prevBtn = document.getElementById("prevBtn");
      var nextBtn = document.getElementById("nextBtn");
      var slideIndicator = document.getElementById("slideIndicator");
      var topActions = document.querySelector(".top-actions");
      var activeIndex = 0;
      var reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      var lastDeckScrollTop = deck.scrollTop || 0;

      function clampIndex(index) {
        if (index < 0) {
          return 0;
        }
        if (index > slides.length - 1) {
          return slides.length - 1;
        }
        return index;
      }

      function updateUi() {
        slideIndicator.textContent = (activeIndex + 1) + " / " + slides.length;
        prevBtn.disabled = activeIndex === 0;
        nextBtn.disabled = activeIndex === slides.length - 1;
      }

      function updateTopActionsVisibility() {
        if (!topActions) {
          return;
        }

        var currentScrollTop = Math.max(deck.scrollTop || 0, 0);
        var isNearTop = currentScrollTop < 28;
        var isScrollingDown = currentScrollTop > lastDeckScrollTop + 6;
        var isScrollingUp = currentScrollTop < lastDeckScrollTop - 6;

        if (isNearTop || isScrollingUp) {
          topActions.classList.remove("is-hidden");
        } else if (isScrollingDown) {
          topActions.classList.add("is-hidden");
        }

        lastDeckScrollTop = currentScrollTop;
      }

      function goToSlide(index) {
        activeIndex = clampIndex(index);
        slides[activeIndex].scrollIntoView({
          behavior: reducedMotion ? "auto" : "smooth",
          block: "start"
        });
        updateUi();
      }

      function handleKeyNavigation(event) {
        var tag = event.target && event.target.tagName ? event.target.tagName.toLowerCase() : "";
        if (tag === "input" || tag === "textarea" || tag === "select" || event.target.isContentEditable) {
          return;
        }

        if (event.key === "ArrowRight" || event.key === "ArrowDown" || event.key === "PageDown" || event.key === " ") {
          event.preventDefault();
          goToSlide(activeIndex + 1);
        } else if (event.key === "ArrowLeft" || event.key === "ArrowUp" || event.key === "PageUp") {
          event.preventDefault();
          goToSlide(activeIndex - 1);
        } else if (event.key === "Home") {
          event.preventDefault();
          goToSlide(0);
        } else if (event.key === "End") {
          event.preventDefault();
          goToSlide(slides.length - 1);
        }
      }

      function syncActiveSlideFromViewport() {
        var bestIndex = activeIndex;
        var bestDistance = Number.POSITIVE_INFINITY;
        for (var i = 0; i < slides.length; i += 1) {
          var distance = Math.abs(slides[i].offsetTop - deck.scrollTop);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestIndex = i;
          }
        }
        if (bestIndex !== activeIndex) {
          activeIndex = bestIndex;
          updateUi();
        }
      }

      function getBestTitleBreakIndex(words) {
        var bestIndex = 1;
        var bestDelta = Number.POSITIVE_INFINITY;
        for (var i = 1; i < words.length; i += 1) {
          var leftLength = words.slice(0, i).join(" ").length;
          var rightLength = words.slice(i).join(" ").length;
          var delta = Math.abs(leftLength - rightLength);
          if (delta < bestDelta) {
            bestDelta = delta;
            bestIndex = i;
          }
        }
        return bestIndex;
      }

      function splitSingleLineCardTitles() {
        var titles = deck.querySelectorAll(".card-head h3");
        for (var i = 0; i < titles.length; i += 1) {
          var title = titles[i];
          if (title.dataset.splitApplied === "true") {
            continue;
          }

          var cleanText = title.textContent.replace(/\s+/g, " ").trim();
          if (!cleanText) {
            continue;
          }

          var words = cleanText.split(" ");
          if (words.length <= 1) {
            continue;
          }

          var style = window.getComputedStyle(title);
          var lineHeight = parseFloat(style.lineHeight);
          if (Number.isNaN(lineHeight)) {
            continue;
          }

          var isSingleLine = title.scrollHeight <= lineHeight * 1.3;
          if (!isSingleLine) {
            continue;
          }

          var breakIndex = getBestTitleBreakIndex(words);
          var firstLine = words.slice(0, breakIndex).join(" ");
          var secondLine = words.slice(breakIndex).join(" ");

          title.textContent = "";
          var lineOne = document.createElement("span");
          lineOne.className = "title-line";
          lineOne.textContent = firstLine;
          var lineTwo = document.createElement("span");
          lineTwo.className = "title-line";
          lineTwo.textContent = secondLine;

          title.appendChild(lineOne);
          title.appendChild(lineTwo);
          title.dataset.splitApplied = "true";
        }
      }

      prevBtn.addEventListener("click", function () {
        goToSlide(activeIndex - 1);
      });

      nextBtn.addEventListener("click", function () {
        goToSlide(activeIndex + 1);
      });

      deck.addEventListener("scroll", function () {
        updateTopActionsVisibility();
        window.requestAnimationFrame(syncActiveSlideFromViewport);
      }, { passive: true });

      window.addEventListener("keydown", handleKeyNavigation);

      window.requestAnimationFrame(function () {
        window.requestAnimationFrame(splitSingleLineCardTitles);
      });

      updateTopActionsVisibility();
      updateUi();
    })();
  </script>
