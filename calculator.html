  <script>
    (async function () {
      /**
       * @typedef {Object} InputState
       * @property {number} energyRpKwh
       * @property {number} gridRpKwh
       * @property {number} monthlyKwh
       * @property {number} baseFeeChfMonth
       * @property {number} recyclingFeeChfMonth
       * @property {number} meteringFeeChfMonth
       * @property {number} vzevEnergyRpKwh
       * @property {number} vzevFeeChfMonth
       * @property {number} vatPercent
       * @property {"day_high" | "house_empty" | "day_low"} usageProfile
       */

      /**
       * @typedef {Object} MonthResult
       * @property {number} solarShare
       * @property {number} baselineChf
       * @property {number} vzevChf
       * @property {number} savingChf
       */

      var i18nMessages = {};
      var missingKeys = {};

      function getMessageByPath(source, key) {
        var path = String(key || "").split(".");
        var value = source;
        for (var i = 0; i < path.length; i += 1) {
          if (!value || typeof value !== "object" || !Object.prototype.hasOwnProperty.call(value, path[i])) {
            return undefined;
          }
          value = value[path[i]];
        }
        return value;
      }

      function interpolateMessage(template, vars) {
        if (!vars) {
          return template;
        }
        return template.replace(/\{([a-zA-Z0-9_]+)\}/g, function (_match, key) {
          return Object.prototype.hasOwnProperty.call(vars, key) ? String(vars[key]) : "";
        });
      }

      function t(key, vars) {
        var template = getMessageByPath(i18nMessages, key);
        if (typeof template !== "string") {
          if (!missingKeys[key]) {
            missingKeys[key] = true;
            console.warn("[i18n] Missing translation key:", key);
          }
          return "";
        }
        return interpolateMessage(template, vars);
      }

      function applyI18n() {
        var textNodes = document.querySelectorAll("[data-i18n]");
        for (var i = 0; i < textNodes.length; i += 1) {
          var node = textNodes[i];
          node.textContent = t(node.getAttribute("data-i18n"));
        }

        var htmlNodes = document.querySelectorAll("[data-i18n-html]");
        for (var j = 0; j < htmlNodes.length; j += 1) {
          var htmlNode = htmlNodes[j];
          htmlNode.innerHTML = t(htmlNode.getAttribute("data-i18n-html"));
        }

        var attrNodes = document.querySelectorAll("[data-i18n-attr]");
        for (var k = 0; k < attrNodes.length; k += 1) {
          var attrNode = attrNodes[k];
          var definition = attrNode.getAttribute("data-i18n-attr") || "";
          var mappings = definition.split(";");

          for (var m = 0; m < mappings.length; m += 1) {
            var mapping = mappings[m].trim();
            if (!mapping) {
              continue;
            }
            var separatorIndex = mapping.indexOf(":");
            if (separatorIndex === -1) {
              continue;
            }
            var attributeName = mapping.slice(0, separatorIndex).trim();
            var translationKey = mapping.slice(separatorIndex + 1).trim();
            attrNode.setAttribute(attributeName, t(translationKey));
          }
        }
      }

      async function loadI18n(url) {
        try {
          var response = await fetch(url, { cache: "no-store" });
          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }
          i18nMessages = await response.json();
        } catch (error) {
          i18nMessages = {};
          document.body.setAttribute("data-text-load-error", "true");
          if (window.location.protocol === "file:") {
            document.body.setAttribute("data-text-load-error-reason", "file-protocol");
            console.error(
              "[i18n] Failed to load calculator texts from file://. Start a local server, e.g. `python3 -m http.server`, and open http://localhost:8000/calculator.html",
              error
            );
          } else {
            console.error("[i18n] Failed to load calculator texts:", error);
          }
        }
      }

      await loadI18n("texts/calculator.de-CH.json");
      applyI18n();

      const STORAGE_KEY = "vzevcalc.state.v1";
      const USAGE_PROFILE_DAY_SHARE = Object.freeze({
        day_high: 0.7,
        house_empty: 0.5,
        day_low: 0.3
      });
      const USAGE_PROFILE_TEXT_KEY = Object.freeze({
        day_high: "fields.usageProfile.options.day_high",
        house_empty: "fields.usageProfile.options.house_empty",
        day_low: "fields.usageProfile.options.day_low"
      });
      const MONTHS = Object.freeze([
        { key: "jan", labelKey: "months.jan" },
        { key: "feb", labelKey: "months.feb" },
        { key: "mar", labelKey: "months.mar" },
        { key: "apr", labelKey: "months.apr" },
        { key: "may", labelKey: "months.may" },
        { key: "jun", labelKey: "months.jun" },
        { key: "jul", labelKey: "months.jul" },
        { key: "aug", labelKey: "months.aug" },
        { key: "sep", labelKey: "months.sep" },
        { key: "oct", labelKey: "months.oct" },
        { key: "nov", labelKey: "months.nov" },
        { key: "dec", labelKey: "months.dec" }
      ]);
      /** @type {InputState} */
      const DEFAULT_STATE = Object.freeze({
        energyRpKwh: 12.9,
        gridRpKwh: 12.86,
        monthlyKwh: 250,
        baseFeeChfMonth: 10,
        recyclingFeeChfMonth: 5,
        meteringFeeChfMonth: 4,
        vzevEnergyRpKwh: 17,
        vzevFeeChfMonth: 3,
        vatPercent: 8.1,
        usageProfile: "day_high"
      });

      const chfFormatter = new Intl.NumberFormat("de-CH", {
        style: "currency",
        currency: "CHF",
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });

      const percentFormatter = new Intl.NumberFormat("de-CH", {
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      });
      const detailNumberFormatter = new Intl.NumberFormat("de-CH", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
      const detailRateFormatter = new Intl.NumberFormat("de-CH", {
        minimumFractionDigits: 4,
        maximumFractionDigits: 4
      });

      const form = document.getElementById("calcForm");
      const resetBtn = document.getElementById("resetBtn");
      const resultsBody = document.getElementById("resultsBody");
      const yearBaseline = document.getElementById("yearBaseline");
      const yearVzev = document.getElementById("yearVzev");
      const yearSaving = document.getElementById("yearSaving");
      const yearSavingItem = yearSaving ? yearSaving.closest(".summary-item") : null;
      const resultConclusion = document.getElementById("resultConclusion");
      const validationStatus = document.getElementById("validationStatus");
      const advancedInputs = document.getElementById("advancedInputs");
      const calcSteps = document.getElementById("calcSteps");

      const numericFieldIds = [
        "energyRpKwh",
        "gridRpKwh",
        "monthlyKwh",
        "baseFeeChfMonth",
        "recyclingFeeChfMonth",
        "meteringFeeChfMonth",
        "vzevEnergyRpKwh",
        "vzevFeeChfMonth",
        "vatPercent"
      ];
      const advancedFieldIds = [
        "energyRpKwh",
        "gridRpKwh",
        "baseFeeChfMonth",
        "recyclingFeeChfMonth",
        "meteringFeeChfMonth",
        "vzevFeeChfMonth",
        "vatPercent"
      ];

      initialize();

      function getUsageProfileLabel(profile) {
        const labelKey = USAGE_PROFILE_TEXT_KEY[profile] || USAGE_PROFILE_TEXT_KEY[DEFAULT_STATE.usageProfile];
        return t(labelKey);
      }

      function initialize() {
        const initialState = loadState();
        writeStateToForm(initialState);
        renderFromForm();
        setupTooltipPlacement();

        form.addEventListener("input", renderFromForm);
        form.addEventListener("change", renderFromForm);

        resetBtn.addEventListener("click", handleReset);
      }

      function setupTooltipPlacement() {
        const triggers = form.querySelectorAll(".info-trigger");
        triggers.forEach(function (trigger) {
          trigger.addEventListener("mouseenter", handleTooltipPlacement);
          trigger.addEventListener("focus", handleTooltipPlacement);
          trigger.addEventListener("click", handleTooltipPlacement);
        });
      }

      /**
       * @param {MouseEvent|FocusEvent} event
       */
      function handleTooltipPlacement(event) {
        const trigger = event.currentTarget;
        if (!(trigger instanceof HTMLElement)) {
          return;
        }

        const row = trigger.closest(".field-label-row");
        if (!row) {
          return;
        }

        const tooltip = row.querySelector(".field-tooltip");
        if (!(tooltip instanceof HTMLElement)) {
          return;
        }

        positionTooltip(row, tooltip);
      }

      /**
       * @param {Element} row
       * @param {HTMLElement} tooltip
       */
      function positionTooltip(row, tooltip) {
        row.classList.remove("tooltip-below");
        const rect = tooltip.getBoundingClientRect();
        if (rect.top < 12) {
          row.classList.add("tooltip-below");
        }
      }

      /**
       * @returns {InputState}
       */
      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return { ...DEFAULT_STATE };
          }

          const parsed = JSON.parse(raw);
          return sanitizeState(parsed);
        } catch (_error) {
          return { ...DEFAULT_STATE };
        }
      }

      /**
       * @param {InputState} state
       */
      function saveState(state) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch (_error) {
          // Ignore storage failures (private mode or blocked localStorage).
        }
      }

      /**
       * @param {unknown} candidate
       * @returns {InputState}
       */
      function sanitizeState(candidate) {
        const input = candidate && typeof candidate === "object" ? candidate : {};
        return {
          energyRpKwh: normalizeNumber(input.energyRpKwh, DEFAULT_STATE.energyRpKwh),
          gridRpKwh: normalizeNumber(input.gridRpKwh, DEFAULT_STATE.gridRpKwh),
          monthlyKwh: normalizeNumber(input.monthlyKwh, DEFAULT_STATE.monthlyKwh),
          baseFeeChfMonth: normalizeNumber(input.baseFeeChfMonth, DEFAULT_STATE.baseFeeChfMonth),
          recyclingFeeChfMonth: normalizeNumber(input.recyclingFeeChfMonth, DEFAULT_STATE.recyclingFeeChfMonth),
          meteringFeeChfMonth: normalizeNumber(input.meteringFeeChfMonth, DEFAULT_STATE.meteringFeeChfMonth),
          vzevEnergyRpKwh: normalizeNumber(input.vzevEnergyRpKwh, DEFAULT_STATE.vzevEnergyRpKwh),
          vzevFeeChfMonth: normalizeNumber(input.vzevFeeChfMonth, DEFAULT_STATE.vzevFeeChfMonth),
          vatPercent: normalizeNumber(input.vatPercent, DEFAULT_STATE.vatPercent),
          usageProfile: normalizeUsageProfile(input.usageProfile, DEFAULT_STATE.usageProfile)
        };
      }

      /**
       * @param {unknown} value
       * @param {number} fallback
       * @returns {number}
       */
      function normalizeNumber(value, fallback) {
        const numeric = Number(value);
        return Number.isFinite(numeric) && numeric >= 0 ? numeric : fallback;
      }

      /**
       * @param {unknown} value
       * @param {"day_high" | "house_empty" | "day_low" | ""} fallback
       * @returns {"day_high" | "house_empty" | "day_low" | ""}
       */
      function normalizeUsageProfile(value, fallback) {
        return Object.prototype.hasOwnProperty.call(USAGE_PROFILE_DAY_SHARE, value) ? value : fallback;
      }

      /**
       * @param {InputState} state
       */
      function writeStateToForm(state) {
        form.energyRpKwh.value = state.energyRpKwh;
        form.gridRpKwh.value = state.gridRpKwh;
        form.monthlyKwh.value = state.monthlyKwh;
        form.baseFeeChfMonth.value = state.baseFeeChfMonth;
        form.recyclingFeeChfMonth.value = state.recyclingFeeChfMonth;
        form.meteringFeeChfMonth.value = state.meteringFeeChfMonth;
        form.vzevEnergyRpKwh.value = state.vzevEnergyRpKwh;
        form.vzevFeeChfMonth.value = state.vzevFeeChfMonth;
        form.vatPercent.value = state.vatPercent;
        form.usageProfile.value = state.usageProfile;
      }

      /**
       * @returns {InputState}
       */
      function readStateFromForm() {
        return {
          energyRpKwh: Number(form.energyRpKwh.value),
          gridRpKwh: Number(form.gridRpKwh.value),
          monthlyKwh: Number(form.monthlyKwh.value),
          baseFeeChfMonth: Number(form.baseFeeChfMonth.value),
          recyclingFeeChfMonth: Number(form.recyclingFeeChfMonth.value),
          meteringFeeChfMonth: Number(form.meteringFeeChfMonth.value),
          vzevEnergyRpKwh: Number(form.vzevEnergyRpKwh.value),
          vzevFeeChfMonth: Number(form.vzevFeeChfMonth.value),
          vatPercent: Number(form.vatPercent.value),
          usageProfile: form.usageProfile.value
        };
      }

      function renderFromForm() {
        const state = readStateFromForm();
        const errors = validateState(state);
        applyValidation(errors);

        if (Object.keys(errors).length > 0) {
          renderInvalid();
          return;
        }

        saveState(state);
        const yearResult = calculateYear(state);
        renderResults(yearResult, state);
      }

      /**
       * @param {InputState} state
       * @returns {Record<string, string>}
       */
      function validateState(state) {
        const errors = {};

        for (const fieldId of numericFieldIds) {
          const value = state[fieldId];
          if (!Number.isFinite(value) || value < 0) {
            errors[fieldId] = t("validation.invalidNumber");
          }
        }

        if (!Object.prototype.hasOwnProperty.call(USAGE_PROFILE_DAY_SHARE, state.usageProfile)) {
          errors.usageProfile = t("validation.invalidProfile");
        }

        return errors;
      }

      /**
       * @param {number} monthIndex
       * @param {"day_high" | "house_empty" | "day_low"} usageProfile
       * @returns {number}
       */
      function calculateSolarShare(monthIndex, usageProfile) {
        if (!isSolarMonth(monthIndex)) {
          return 0;
        }

        return USAGE_PROFILE_DAY_SHARE[usageProfile] ?? USAGE_PROFILE_DAY_SHARE[DEFAULT_STATE.usageProfile];
      }

      /**
       * @param {Record<string, string>} errors
       */
      function applyValidation(errors) {
        const hasAdvancedError = advancedFieldIds.some(function (fieldId) {
          return Boolean(errors[fieldId]);
        });
        if (hasAdvancedError && advancedInputs) {
          advancedInputs.open = true;
        }

        const fields = form.querySelectorAll(".field");
        fields.forEach(function (field) {
          const key = field.getAttribute("data-field");
          const msg = errors[key] || "";
          field.classList.toggle("invalid", Boolean(msg));
          const errorEl = document.getElementById("error-" + key);
          if (errorEl) {
            errorEl.textContent = msg;
          }
        });
      }

      function renderInvalid() {
        validationStatus.classList.remove("hidden");
        validationStatus.textContent = t("validation.invalidStatus");

        yearBaseline.textContent = t("results.emptyValue");
        yearVzev.textContent = t("results.emptyValue");
        yearSaving.textContent = t("results.emptyValue");
        yearSaving.classList.remove("positive", "negative", "neutral");
        if (yearSavingItem) {
          yearSavingItem.classList.remove("positive", "negative");
          yearSavingItem.classList.add("neutral");
        }
        resultConclusion.innerHTML = t("results.defaultConclusionHtml");
        resultConclusion.classList.remove("positive", "negative");
        resultConclusion.classList.add("neutral");
        resultsBody.innerHTML = "";

        if (calcSteps) {
          calcSteps.innerHTML = "";
        }
      }

      /**
       * @param {InputState} state
       * @param {number} monthIndex
       * @returns {MonthResult}
       */
      function calculateMonth(state, monthIndex) {
        const vatFactor = 1 + state.vatPercent / 100;
        const baselineRateChfPerKwh = ((state.energyRpKwh + state.gridRpKwh) * vatFactor) / 100;
        const baseFeeGross = state.baseFeeChfMonth * vatFactor;
        const recyclingFeeGross = state.recyclingFeeChfMonth * vatFactor;
        const meteringFeeGross = state.meteringFeeChfMonth * vatFactor;
        const vzevFeeGross = state.vzevFeeChfMonth * vatFactor;
        const solarShare = calculateSolarShare(monthIndex, state.usageProfile);
        const solarKwh = state.monthlyKwh * solarShare;
        const restKwh = state.monthlyKwh - solarKwh;
        const baselineChf = state.monthlyKwh * baselineRateChfPerKwh + baseFeeGross + recyclingFeeGross + meteringFeeGross;
        const vzevChf =
          solarKwh * (state.vzevEnergyRpKwh / 100) +
          restKwh * baselineRateChfPerKwh +
          baseFeeGross +
          recyclingFeeGross +
          meteringFeeGross +
          vzevFeeGross;
        const savingChf = baselineChf - vzevChf;

        return {
          solarShare: solarShare,
          baselineChf: baselineChf,
          vzevChf: vzevChf,
          savingChf: savingChf
        };
      }

      /**
       * @param {InputState} state
       */
      function calculateYear(state) {
        const months = MONTHS.map(function (_month, index) {
          return calculateMonth(state, index);
        });

        const totals = months.reduce(
          function (acc, month) {
            acc.baselineChf += month.baselineChf;
            acc.vzevChf += month.vzevChf;
            acc.savingChf += month.savingChf;
            return acc;
          },
          { baselineChf: 0, vzevChf: 0, savingChf: 0 }
        );

        return { months: months, totals: totals };
      }

      /**
       * @param {{ months: MonthResult[], totals: { baselineChf: number, vzevChf: number, savingChf: number } }} results
       * @param {InputState} state
       */
      function renderResults(results, state) {
        validationStatus.classList.add("hidden");
        validationStatus.textContent = "";

        const rows = results.months
          .map(function (month, index) {
            const savingClass = month.savingChf >= 0 ? "pos" : "neg";
            const monthLabel = t(MONTHS[index].labelKey);
            const solarLabel = percentFormatter.format(month.solarShare * 100) + "%";

            return (
              "<tr>" +
              "<td>" + monthLabel + "</td>" +
              "<td>" + solarLabel + "</td>" +
              "<td>" + formatChf(month.baselineChf) + "</td>" +
              "<td>" + formatChf(month.vzevChf) + "</td>" +
              "<td class='saving " + savingClass + "'>" + formatChf(month.savingChf) + "</td>" +
              "</tr>"
            );
          })
          .join("");

        const totalSavingClass = results.totals.savingChf >= 0 ? "pos" : "neg";
        resultsBody.innerHTML =
          rows +
          "<tr class='total-row'>" +
          "<td>" + t("results.table.totalLabel") + "</td>" +
          "<td>-</td>" +
          "<td>" + formatChf(results.totals.baselineChf) + "</td>" +
          "<td>" + formatChf(results.totals.vzevChf) + "</td>" +
          "<td class='saving " + totalSavingClass + "'>" + formatChf(results.totals.savingChf) + "</td>" +
          "</tr>";

        yearBaseline.textContent = formatChf(results.totals.baselineChf);
        yearVzev.textContent = formatChf(results.totals.vzevChf);
        const conclusion = getConclusion(results.totals.savingChf);
        yearSaving.textContent = formatChf(results.totals.savingChf);
        yearSaving.classList.remove("positive", "negative", "neutral");
        yearSaving.classList.add(conclusion.tone);
        if (yearSavingItem) {
          yearSavingItem.classList.remove("positive", "negative", "neutral");
          yearSavingItem.classList.add(conclusion.tone);
        }
        resultConclusion.innerHTML = conclusion.text;
        resultConclusion.classList.remove("positive", "negative", "neutral");
        resultConclusion.classList.add(conclusion.tone);
        renderCalculationDetails(state);
      }

      /**
       * @param {InputState} state
       * @param {number} solarShare
       * @returns {{
       *   vatFactor: number,
       *   baselineRateChfPerKwh: number,
       *   baseFeeGross: number,
       *   recyclingFeeGross: number,
       *   meteringFeeGross: number,
       *   vzevFeeGross: number,
       *   solarKwh: number,
       *   restKwh: number,
       *   baselineChf: number,
       *   vzevChf: number,
       *   savingChf: number
       * }}
       */
      function calculateDetailScenario(state, solarShare) {
        const vatFactor = 1 + state.vatPercent / 100;
        const baselineRateChfPerKwh = ((state.energyRpKwh + state.gridRpKwh) * vatFactor) / 100;
        const baseFeeGross = state.baseFeeChfMonth * vatFactor;
        const recyclingFeeGross = state.recyclingFeeChfMonth * vatFactor;
        const meteringFeeGross = state.meteringFeeChfMonth * vatFactor;
        const vzevFeeGross = state.vzevFeeChfMonth * vatFactor;
        const solarKwh = state.monthlyKwh * solarShare;
        const restKwh = state.monthlyKwh - solarKwh;
        const baselineChf = state.monthlyKwh * baselineRateChfPerKwh + baseFeeGross + recyclingFeeGross + meteringFeeGross;
        const vzevChf =
          solarKwh * (state.vzevEnergyRpKwh / 100) +
          restKwh * baselineRateChfPerKwh +
          baseFeeGross +
          recyclingFeeGross +
          meteringFeeGross +
          vzevFeeGross;
        const savingChf = baselineChf - vzevChf;

        return {
          vatFactor: vatFactor,
          baselineRateChfPerKwh: baselineRateChfPerKwh,
          baseFeeGross: baseFeeGross,
          recyclingFeeGross: recyclingFeeGross,
          meteringFeeGross: meteringFeeGross,
          vzevFeeGross: vzevFeeGross,
          solarKwh: solarKwh,
          restKwh: restKwh,
          baselineChf: baselineChf,
          vzevChf: vzevChf,
          savingChf: savingChf
        };
      }

      /**
       * @param {InputState} state
       */
      function renderCalculationDetails(state) {
        if (!calcSteps) {
          return;
        }

        const selectedProfileShare = USAGE_PROFILE_DAY_SHARE[state.usageProfile] ?? USAGE_PROFILE_DAY_SHARE[DEFAULT_STATE.usageProfile];
        const selectedProfileLabel = getUsageProfileLabel(state.usageProfile);
        const selectedProfilePercentLabel = formatDetailNumber(selectedProfileShare * 100) + " %";
        const summerScenario = calculateDetailScenario(state, selectedProfileShare);
        const winterScenario = calculateDetailScenario(state, 0);
        const annualSavingByProfile = summerScenario.savingChf * 9 + winterScenario.savingChf * 3;

        calcSteps.innerHTML =
          "<li class='calc-step'>" +
          "<strong class='calc-step-title'>" + t("calc.steps.tarifbasis.title") + "</strong>" +
          "<code class='formula'>" + t("calc.steps.tarifbasis.formulaVatFactor") + "</code>" +
          "<code class='formula calc-values'>" + t("calc.steps.tarifbasis.valuesVatFactor", {
            vatPercent: formatDetailNumber(state.vatPercent),
            vatFactor: formatDetailNumber(summerScenario.vatFactor)
          }) + "</code>" +
          "<code class='formula'>" + t("calc.steps.tarifbasis.formulaBaselineRate") + "</code>" +
          "<code class='formula calc-values'>" + t("calc.steps.tarifbasis.valuesBaselineRate", {
            energyRpKwh: formatDetailNumber(state.energyRpKwh),
            gridRpKwh: formatDetailNumber(state.gridRpKwh),
            vatFactor: formatDetailNumber(summerScenario.vatFactor),
            baselineRate: formatDetailChfPerKwh(summerScenario.baselineRateChfPerKwh)
          }) + "</code>" +
          "</li>" +
          "<li class='calc-step'>" +
          "<strong class='calc-step-title'>" + t("calc.steps.solarShare.title") + "</strong>" +
          "<code class='formula'>" + t("calc.steps.solarShare.formula") + "</code>" +
          "<code class='formula calc-values'>" + t("calc.steps.solarShare.valuesSummer", {
            profile: selectedProfileLabel,
            share: selectedProfilePercentLabel
          }) + "</code>" +
          "<code class='formula calc-values'>" + t("calc.steps.solarShare.valuesWinter", {
            profile: selectedProfileLabel
          }) + "</code>" +
          "</li>" +
          "<li class='calc-step'>" +
          "<strong class='calc-step-title'>" + t("calc.steps.energyVolumes.title") + "</strong>" +
          "<code class='formula'>" + t("calc.steps.energyVolumes.formulaSolar") + "</code>" +
          "<code class='formula'>" + t("calc.steps.energyVolumes.formulaRest") + "</code>" +
          "<code class='formula calc-values'>" + t("calc.steps.energyVolumes.valuesSummer", {
            monthlyKwh: formatDetailKwh(state.monthlyKwh),
            share: selectedProfilePercentLabel,
            solarKwh: formatDetailKwh(summerScenario.solarKwh),
            restKwh: formatDetailKwh(summerScenario.restKwh)
          }) + "</code>" +
          "<code class='formula calc-values'>" + t("calc.steps.energyVolumes.valuesWinter", {
            monthlyKwh: formatDetailKwh(state.monthlyKwh),
            solarKwh: formatDetailKwh(winterScenario.solarKwh),
            restKwh: formatDetailKwh(winterScenario.restKwh)
          }) + "</code>" +
          "</li>" +
          "<li class='calc-step'>" +
          "<strong class='calc-step-title'>" + t("calc.steps.monthlyWithoutSolar.title") + "</strong>" +
          "<code class='formula'>" + t("calc.steps.monthlyWithoutSolar.formula") + "</code>" +
          "<code class='formula calc-values'>" + t("calc.steps.monthlyWithoutSolar.values", {
            monthlyKwh: formatDetailKwh(state.monthlyKwh),
            baselineRate: formatDetailChfPerKwh(summerScenario.baselineRateChfPerKwh),
            baseFeeGross: formatDetailChf(summerScenario.baseFeeGross),
            recyclingFeeGross: formatDetailChf(summerScenario.recyclingFeeGross),
            meteringFeeGross: formatDetailChf(summerScenario.meteringFeeGross),
            baselineChf: formatDetailChf(summerScenario.baselineChf)
          }) + "</code>" +
          "</li>" +
          "<li class='calc-step'>" +
          "<strong class='calc-step-title'>" + t("calc.steps.monthlyWithSolarSummer.title", {
            profile: selectedProfileLabel
          }) + "</strong>" +
          "<code class='formula'>" + t("calc.steps.monthlyWithSolarSummer.formula") + "</code>" +
          "<code class='formula calc-values'>" + t("calc.steps.monthlyWithSolarSummer.values", {
            solarKwh: formatDetailKwh(summerScenario.solarKwh),
            vzevEnergyRpKwh: formatDetailNumber(state.vzevEnergyRpKwh),
            restKwh: formatDetailKwh(summerScenario.restKwh),
            baselineRate: formatDetailChfPerKwh(summerScenario.baselineRateChfPerKwh),
            baseFeeGross: formatDetailChf(summerScenario.baseFeeGross),
            recyclingFeeGross: formatDetailChf(summerScenario.recyclingFeeGross),
            meteringFeeGross: formatDetailChf(summerScenario.meteringFeeGross),
            vzevFeeGross: formatDetailChf(summerScenario.vzevFeeGross),
            vzevChf: formatDetailChf(summerScenario.vzevChf)
          }) + "</code>" +
          "</li>" +
          "<li class='calc-step'>" +
          "<strong class='calc-step-title'>" + t("calc.steps.monthlyWithSolarWinter.title", {
            profile: selectedProfileLabel
          }) + "</strong>" +
          "<code class='formula'>" + t("calc.steps.monthlyWithSolarWinter.formula") + "</code>" +
          "<code class='formula calc-values'>" + t("calc.steps.monthlyWithSolarWinter.values", {
            solarKwh: formatDetailKwh(winterScenario.solarKwh),
            vzevEnergyRpKwh: formatDetailNumber(state.vzevEnergyRpKwh),
            restKwh: formatDetailKwh(winterScenario.restKwh),
            baselineRate: formatDetailChfPerKwh(winterScenario.baselineRateChfPerKwh),
            baseFeeGross: formatDetailChf(winterScenario.baseFeeGross),
            recyclingFeeGross: formatDetailChf(winterScenario.recyclingFeeGross),
            meteringFeeGross: formatDetailChf(winterScenario.meteringFeeGross),
            vzevFeeGross: formatDetailChf(winterScenario.vzevFeeGross),
            vzevChf: formatDetailChf(winterScenario.vzevChf)
          }) + "</code>" +
          "</li>" +
          "<li class='calc-step'>" +
          "<strong class='calc-step-title'>" + t("calc.steps.savings.title") + "</strong>" +
          "<code class='formula'>" + t("calc.steps.savings.formulaMonthly") + "</code>" +
          "<code class='formula'>" + t("calc.steps.savings.formulaYearly", {
            profile: selectedProfileLabel
          }) + "</code>" +
          "<code class='formula calc-values'>" + t("calc.steps.savings.valuesSummer", {
            baselineChf: formatDetailChf(summerScenario.baselineChf),
            vzevChf: formatDetailChf(summerScenario.vzevChf),
            savingChf: formatDetailChf(summerScenario.savingChf)
          }) + "</code>" +
          "<code class='formula calc-values'>" + t("calc.steps.savings.valuesWinter", {
            baselineChf: formatDetailChf(winterScenario.baselineChf),
            vzevChf: formatDetailChf(winterScenario.vzevChf),
            savingChf: formatDetailChf(winterScenario.savingChf)
          }) + "</code>" +
          "<code class='formula calc-values'>" + t("calc.steps.savings.valuesYear", {
            summerSavingChf: formatDetailChf(summerScenario.savingChf),
            winterSavingChf: formatDetailChf(winterScenario.savingChf),
            annualSavingByProfile: formatDetailChf(annualSavingByProfile)
          }) + "</code>" +
          "</li>";
      }

      /**
       * @param {number} savingChf
       * @returns {{ text: string, tone: "positive" | "negative" | "neutral" }}
       */
      function getConclusion(savingChf) {
        if (savingChf > 10) {
          return {
            text: t("conclusion.positiveHtml", { amount: formatChf(savingChf) }),
            tone: "positive"
          };
        }

        if (savingChf < -10) {
          return {
            text: t("conclusion.negativeHtml", { amount: formatChf(Math.abs(savingChf)) }),
            tone: "negative"
          };
        }

        return {
          text: t("conclusion.neutralHtml", { amount: formatChf(Math.abs(savingChf)) }),
          tone: "neutral"
        };
      }

      /**
       * @param {number} value
       * @returns {string}
       */
      function formatChf(value) {
        return chfFormatter.format(roundToFiveRappen(value));
      }

      /**
       * @param {number} value
       * @returns {string}
       */
      function formatDetailNumber(value) {
        return detailNumberFormatter.format(value);
      }

      /**
       * @param {number} value
       * @returns {string}
       */
      function formatDetailChf(value) {
        return formatDetailNumber(value) + " " + t("calc.units.chf");
      }

      /**
       * @param {number} value
       * @returns {string}
       */
      function formatDetailChfPerKwh(value) {
        return detailRateFormatter.format(value) + " " + t("calc.units.chfPerKwh");
      }

      /**
       * @param {number} value
       * @returns {string}
       */
      function formatDetailKwh(value) {
        return formatDetailNumber(value) + " " + t("calc.units.kwh");
      }

      /**
       * @param {number} monthIndex
       * @returns {boolean}
       */
      function isSolarMonth(monthIndex) {
        return monthIndex >= 2 && monthIndex <= 10;
      }

      /**
       * @param {number} value
       * @returns {number}
       */
      function roundToFiveRappen(value) {
        return Math.round((value + Number.EPSILON) * 20) / 20;
      }

      function handleReset() {
        try {
          localStorage.removeItem(STORAGE_KEY);
        } catch (_error) {
          // Ignore storage errors.
        }

        writeStateToForm({ ...DEFAULT_STATE });
        renderFromForm();
      }
    })();
  </script>
</body>
</html>
